{% extends "base.html" %}
{% block title %}{{ title }} — Task Tracker{% endblock %}
{% block content %}
<div class="max-w-lg">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ title }}</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg px-5 py-2.5 text-sm transition">Save</button>
      <a href="{% url 'dashboard' %}" class="text-gray-500 hover:text-gray-700 text-sm py-2.5">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
